<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Skyline Steps, a compact Three.js platformer starter with keyboard and touch controls."
    />
    <meta name="theme-color" content="#111312" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Skyline Steps · Three.js Platformer</title>
  </head>
  <body>
    <main id="app">
      <canvas
        id="game-canvas"
        tabindex="0"
        aria-label="Skyline Steps 3D platformer game canvas"
      ></canvas>
      <section id="hud" aria-label="Run status">
        <div class="hud-metric">
          <span>Flag</span>
          <strong><span id="score-value">0</span>/<span id="target-value">1</span></strong>
        </div>
        <div class="hud-metric">
          <span>Time</span>
          <strong id="timer-value">00:00.0</strong>
        </div>
        <div id="status-line" aria-live="polite" aria-atomic="true">
          Run and jump · reach the summit flag
        </div>
      </section>
      <div id="system-controls" aria-label="Game settings">
        <button id="mute-button" type="button" aria-pressed="false">Sound on</button>
        <button id="pause-button" type="button" aria-pressed="false">Pause</button>
      </div>
      <section id="state-panel" hidden aria-live="assertive" aria-atomic="true">
        <p id="state-kicker">Skyline Steps</p>
        <h1 id="state-title">Game paused</h1>
        <p id="state-copy">Press P or Escape to resume.</p>
        <button id="retry-button" type="button" hidden>Try again</button>
      </section>
      <div id="touch-controls" role="group" aria-label="Touch game controls">
        <div id="touch-stick" role="application" aria-label="Movement joystick">
          <div id="touch-knob"></div>
        </div>
        <button id="dash-button" type="button" aria-label="Jump">Jump</button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
