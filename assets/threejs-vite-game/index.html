<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Relay Run, a compact local-first Three.js arena game starter with keyboard and touch controls."
    />
    <meta name="theme-color" content="#111312" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Relay Run · Three.js Arena Game</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" tabindex="0" aria-label="Relay Run playable game canvas"></canvas>
      <section id="hud" aria-label="Run status">
        <div class="hud-metric">
          <span>Relays</span>
          <strong><span id="score-value">0</span>/<span id="target-value">8</span></strong>
        </div>
        <div class="hud-metric">
          <span>Signal</span>
          <strong id="timer-value">00:42</strong>
        </div>
        <div id="status-line" role="status" aria-live="polite" aria-atomic="true">
          Collect relays · avoid sweepers
        </div>
      </section>
      <div id="system-controls" aria-label="Game settings">
        <button id="mute-button" type="button" aria-pressed="false">Sound on</button>
        <button id="pause-button" type="button" aria-pressed="false" aria-keyshortcuts="P Escape">
          Pause
        </button>
      </div>
      <section id="state-panel" hidden aria-live="assertive">
        <p id="state-kicker">Relay Run</p>
        <h1 id="state-title">Game paused</h1>
        <p id="state-copy">Press P or Escape to resume.</p>
        <button id="retry-button" type="button" hidden aria-keyshortcuts="R Enter">Run again</button>
      </section>
      <div id="touch-controls" role="group" aria-label="Touch game controls">
        <div id="touch-stick" role="application" aria-label="Movement joystick">
          <div id="touch-knob"></div>
        </div>
        <button id="dash-button" type="button" aria-label="Hold to dash" aria-keyshortcuts="Space Shift">
          Dash
        </button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
